<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P1-03 被错误命中的授权目录 detail.html</title>
  <style>
    body {
      margin: 0;
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1f2328;
      background: #fff;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px;
    }
    .safe {
      padding: 12px 14px;
      border: 1px solid rgba(34,197,94,.28);
      border-radius: 8px;
      color: #166534;
      background: rgba(34,197,94,.08);
    }
    code {
      padding: 2px 5px;
      border-radius: 4px;
      background: #f6f8fa;
    }
  </style>
</head>
<body>
  <main>
    <h1>P1-03 授权目录中的同名文件</h1>
    <p class="safe">这个文件位于 <code>p1-03-authorized-root/detail.html</code>。</p>
    <p id="shouldNotChange">这段文字不应该因为编辑另一个 detail.html 而被修改。</p>
    <p>如果测试后这个文件内容变化，说明保存 fallback 命中了错误的同名文件。</p>
  </main>
</body>
</html>
