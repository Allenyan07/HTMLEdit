<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>子页面 - 审批单</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #fff; }
    h2 { color: #333; margin-bottom: 16px; }
    .info-row { display: flex; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .info-label { width: 120px; color: #888; font-size: 14px; }
    .info-value { flex: 1; color: #333; font-size: 14px; }
    .btn { display: inline-block; padding: 8px 20px; background: #1976d2; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 16px; }
    .btn:hover { background: #1565c0; }
  </style>
</head>
<body>
  <h2>审批单详情</h2>
  <div class="info-row">
    <span class="info-label">审批单号</span>
    <span class="info-value">AP-2024-001</span>
  </div>
  <div class="info-row">
    <span class="info-label">申请人</span>
    <span class="info-value">张三</span>
  </div>
  <div class="info-row">
    <span class="info-label">申请时间</span>
    <span class="info-value">2024-01-15 10:30</span>
  </div>
  <div class="info-row">
    <span class="info-label">审批状态</span>
    <span class="info-value">待审批</span>
  </div>
  <div class="info-row">
    <span class="info-label">备注</span>
    <span class="info-value">请尽快处理</span>
  </div>
  <button class="btn">通过审批</button>
</body>
</html>
