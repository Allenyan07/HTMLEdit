<!DOCTYPE html>
<html lang="zh-CN"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>06 iframe 壳页面</title>
  <style>
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1f2328;
      background: #f6f8fa;
    }
    header {
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid #d8dee4;
    }
    iframe {
      display: block;
      width: calc(100vw - 40px);
      height: calc(100vh - 112px);
      margin: 20px;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      background: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>iframe 壳页面</h1>
    <p>编辑 iframe 内文本时，保存目标应该是 ，不是当前 shell ，不是当前 shell <code>frames/profile.html</code>，不是当前 shell。</p>
  </header>
  <iframe src="frames/profile.html" title="profile frame"></iframe>


</body></html>
