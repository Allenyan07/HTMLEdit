<!DOCTYPE html>
<html lang="zh-CN"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>01 静态文章页</title>
  <style>
    body {
      margin: 0;
      font: 16px/1.75 Georgia, "Times New Roman", "PingFang SC", serif;
      color: #24292f;
      background: #fff;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    h1 { font-size: 34px; line-height: 1.25; margin: 0 0 12px; }
    .lead { color: #57606a; font-size: 18px; }
    mark { background: #fff3bf; padding: 0 2px; }
    .callout {
      margin: 24px 0;
      padding: 14px 16px;
      border-left: 4px solid #5b6cff;
      background: #f6f8ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>静态 HTML 文本编辑测试</h1>
    <p class="lead">这个页面用于测试标题、段落、列表和内联文本的编辑。</p>

    <p>页改笔应该能编辑这一段普通文本，并且保存后刷新文件仍然保持修改结果。</p>
    <p>这一段包含 <strong>加粗文本</strong>、<em>倾斜文本</em> 和 <mark>高亮词语</mark>，用于观察编辑目标是否选中正确的叶子文本。</p>

    <div class="callout">
      <span>提示卡片中的文字也应该可以被编辑，但不应该影响外层容器的结构</span>
    </div>

    <h2>测试清单</h2>
    <ul>
      <li>双击标题，修改文字。</li>
      <li>Shift+Click 普通段落，修改文字。</li>
      <li>尝试修改列表项中的文字。</li>
      <li>只改颜色或字号，查看是否写入预期样式。</li>
    </ul>
  </main>


</body></html>
