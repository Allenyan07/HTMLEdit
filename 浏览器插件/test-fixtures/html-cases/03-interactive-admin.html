<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>03 后台交互页</title>
  <style>
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f6f8fa;
      color: #1f2328;
    }
    main { padding: 28px; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 14px; }
    button, a.action {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid #d8dee4;
      background: #fff;
      color: #1f2328;
      text-decoration: none;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td { padding: 10px 12px; border-bottom: 1px solid #eaeef2; text-align: left; }
    tr:hover td { background: #fafafa; }
    tr.selected td { background: rgba(91,108,255,.08); }
    #log {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #1f2328;
      color: #fff;
      min-height: 22px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>后台管理交互测试</h1>
    <p>用于验证编辑模式下双击是否拦截页面原有交互。</p>
    <div class="toolbar">
      <button type="button" id="refreshBtn">刷新列表</button>
      <button type="button" id="createBtn">新增规则</button>
      <a class="action" href="#detail">查看详情链接</a>
    </div>
    <table>
      <thead>
        <tr><th>规则名称</th><th>状态</th><th>负责人</th><th>操作提示</th></tr>
      </thead>
      <tbody>
        <tr data-id="R001"><td>春节活动限购规则</td><td>待审核</td><td>张三</td><td>双击行打开详情</td></tr>
        <tr data-id="R002"><td>会员券发放规则</td><td>已提交</td><td>李四</td><td>双击行打开详情</td></tr>
        <tr data-id="R003"><td>异常订单拦截规则</td><td>已驳回</td><td>王五</td><td>双击行打开详情</td></tr>
      </tbody>
    </table>
    <div id="log">等待操作...</div>
  </main>
  <script>
    const log = document.getElementById('log');
    document.getElementById('refreshBtn').addEventListener('click', () => {
      log.textContent = '按钮 click 正常触发：刷新列表';
    });
    document.getElementById('createBtn').addEventListener('click', () => {
      log.textContent = '按钮 click 正常触发：新增规则';
    });
    document.querySelector('.action').addEventListener('click', (event) => {
      event.preventDefault();
      log.textContent = '链接 click 正常触发：查看详情';
    });
    document.querySelectorAll('tbody tr').forEach((row) => {
      row.addEventListener('dblclick', () => {
        document.querySelectorAll('tbody tr').forEach((r) => r.classList.remove('selected'));
        row.classList.add('selected');
        log.textContent = '表格行 dblclick 正常触发：打开 ' + row.dataset.id;
      });
    });
  </script>
</body>
</html>
